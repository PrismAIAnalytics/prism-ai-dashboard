<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>PRISM AI — 20 Compliance Automation Checks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(170deg, #06101f 0%, #0a192f 40%, #0d1f40 70%, #091728 100%);
    color: #e2e8f0;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,170,0.06) 0%, rgba(0,212,170,0.02) 40%, transparent 70%);
    pointer-events: none;
  }

  #header {
    text-align: center;
    padding: 28px 30px 0;
    position: relative;
    z-index: 10;
  }
  #header h1 {
    font-size: 34px;
    font-weight: 800;
    line-height: 1.15;
    background: linear-gradient(135deg, #00d4aa, #38bdf8, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #header h1 span {
    display: block;
    font-size: 40px;
  }
  #header .subtitle {
    font-size: 13px;
    color: #64748b;
    margin-top: 5px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  canvas#particles {
    position: absolute;
    top: 0; left: 0;
    width: 1080px;
    height: 1350px;
    z-index: 3;
    pointer-events: none;
  }

  svg#spokes {
    position: absolute;
    top: 0; left: 0;
    width: 1080px;
    height: 1350px;
    z-index: 1;
  }

  .center-hub {
    position: absolute;
    z-index: 5;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: rgba(0,212,170,0.08);
    border: 2px solid rgba(0,212,170,0.25);
    box-shadow: 0 0 40px rgba(0,212,170,0.08), 0 0 80px rgba(0,212,170,0.04);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    backdrop-filter: blur(12px);
  }
  .center-hub .hub-icon { font-size: 30px; margin-bottom: 2px; }
  .center-hub .hub-title { font-size: 12px; font-weight: 700; color: #00d4aa; }
  .center-hub .hub-sub { font-size: 9px; color: #64748b; }

  .check-item {
    position: absolute;
    z-index: 6;
    width: 130px;
  }
  .check-item.align-left { text-align: left; }
  .check-item.align-right { text-align: right; }
  .check-item.align-center { text-align: center; }

  .check-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 3px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
  }
  .check-title {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 2px;
    line-height: 1.2;
  }
  .check-desc {
    font-size: 9px;
    opacity: 0.4;
    line-height: 1.3;
  }

  .cg-1 .check-num { background: linear-gradient(135deg, #00d4aa, #00b89c); }
  .cg-1 .check-title { color: #6ee7b7; }
  .cg-2 .check-num { background: linear-gradient(135deg, #38bdf8, #0ea5e9); }
  .cg-2 .check-title { color: #7dd3fc; }
  .cg-3 .check-num { background: linear-gradient(135deg, #a855f7, #8b5cf6); }
  .cg-3 .check-title { color: #d8b4fe; }
  .cg-4 .check-num { background: linear-gradient(135deg, #f472b6, #ec4899); }
  .cg-4 .check-title { color: #f9a8d4; }
  .cg-5 .check-num { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
  .cg-5 .check-title { color: #fde68a; }

  #brand {
    position: absolute;
    bottom: 22px;
    left: 0; right: 0;
    text-align: center;
    z-index: 10;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #334155;
  }
  #brand span { color: #00d4aa; font-weight: 700; }
</style>
</head>
<body>

<div id="header">
  <h1>20 Compliance Checks<span>Every Pipeline Needs</span></h1>
  <div class="subtitle">Automated security & governance at scale</div>
</div>

<div class="center-hub">
  <div class="hub-icon">&#x1F6E1;</div>
  <div class="hub-title">PRISM</div>
  <div class="hub-title">Compliance</div>
  <div class="hub-sub">Engine</div>
</div>

<svg id="spokes" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg"></svg>
<canvas id="particles" width="1080" height="1350"></canvas>

<div id="brand"><span>PRISM AI Analytics</span> &mdash; Compliance at machine speed</div>

<script>
const CX = 540, CY = 675;
const INNER_R = 80;
const OUTER_R = 460;

const checks = [
  { n:'01', title:'Null Value Check', desc:'Ensure critical columns have no unexpected missing values', cg:1 },
  { n:'02', title:'Duplicate Record Detection', desc:'Verify primary keys and IDs are not duplicated', cg:1 },
  { n:'03', title:'Primary Key Validation', desc:'Confirm each record has a valid unique identifier', cg:1 },
  { n:'04', title:'Referential Integrity', desc:'Ensure foreign keys match records in related tables', cg:1 },
  { n:'05', title:'Accepted Values Check', desc:'Validate categorical fields contain only expected values', cg:2 },
  { n:'06', title:'Data Type Validation', desc:'Confirm columns match expected data types', cg:2 },
  { n:'07', title:'Range Validation', desc:'Check numeric values fall within realistic limits', cg:2 },
  { n:'08', title:'Date Consistency', desc:'Ensure timestamps follow logical order', cg:2 },
  { n:'09', title:'Freshness Check', desc:'Verify new data arrives within expected time windows', cg:3 },
  { n:'10', title:'Volume Check', desc:'Detect sudden spikes or drops in record counts', cg:3 },
  { n:'11', title:'Outlier Detection', desc:'Identify abnormal values indicating data issues', cg:3 },
  { n:'12', title:'Schema Change Detection', desc:'Ensure pipeline schema matches expected structure', cg:3 },
  { n:'13', title:'Format Validation', desc:'Confirm fields follow proper formats (emails, IPs)', cg:4 },
  { n:'14', title:'Completeness Check', desc:'Verify required columns contain populated values', cg:4 },
  { n:'15', title:'Distribution Drift', desc:'Detect unusual changes in data distribution over time', cg:4 },
  { n:'16', title:'Business Rule Check', desc:'Validate domain-specific rules and constraints', cg:4 },
  { n:'17', title:'Cross-Field Consistency', desc:'Ensure related columns are logically consistent', cg:5 },
  { n:'18', title:'Duplicate Event Detection', desc:'Identify repeated events from ingestion errors', cg:5 },
  { n:'19', title:'Aggregation Consistency', desc:'Verify totals match across pipeline layers', cg:5 },
  { n:'20', title:'Historical Comparison', desc:'Compare current data with historical trends', cg:5 },
];

const COLORS = {
  1: { r:0, g:212, b:170 },
  2: { r:56, g:189, b:248 },
  3: { r:168, g:85, b:247 },
  4: { r:244, g:114, b:182 },
  5: { r:251, g:191, b:36 },
};

const svg = document.getElementById('spokes');
const ns = 'http://www.w3.org/2000/svg';
const spokeEls = [];

// Start from top, going clockwise.
// Right side (items 1-10): text aligned left, positioned to right of spoke end
// Left side (items 11-20): text aligned right, positioned to left of spoke end
const startAngle = -Math.PI / 2;

checks.forEach((check, i) => {
  const angle = startAngle + (i / 20) * Math.PI * 2;
  const cosA = Math.cos(angle);
  const sinA = Math.sin(angle);

  const endX = CX + cosA * OUTER_R;
  const endY = CY + sinA * OUTER_R;
  const startX = CX + cosA * INNER_R;
  const startY = CY + sinA * INNER_R;

  // Determine alignment based on which side
  const isRight = cosA >= -0.05;
  const isTop = sinA < -0.7;
  const isBottom = sinA > 0.7;

  const div = document.createElement('div');
  div.className = `check-item cg-${check.cg}`;

  let itemLeft, itemTop;
  if (isTop || isBottom) {
    // Top/bottom items: center-aligned
    div.classList.add('align-center');
    itemLeft = endX - 65;
    itemTop = isTop ? endY - 75 : endY + 8;
  } else if (isRight) {
    div.classList.add('align-left');
    itemLeft = endX + 8;
    itemTop = endY - 25;
  } else {
    div.classList.add('align-right');
    itemLeft = endX - 138;
    itemTop = endY - 25;
  }

  // Clamp to viewport
  itemLeft = Math.max(5, Math.min(1080 - 135, itemLeft));
  itemTop = Math.max(115, Math.min(1280, itemTop));

  div.style.left = itemLeft + 'px';
  div.style.top = itemTop + 'px';
  div.innerHTML = `
    <div class="check-num">${check.n}</div>
    <div class="check-title">${check.title}</div>
    <div class="check-desc">${check.desc}</div>
  `;
  document.body.appendChild(div);

  // Spoke line
  const spokeEndX = CX + cosA * (OUTER_R - 20);
  const spokeEndY = CY + sinA * (OUTER_R - 20);
  const c = COLORS[check.cg];

  const line = document.createElementNS(ns, 'line');
  line.setAttribute('x1', startX);
  line.setAttribute('y1', startY);
  line.setAttribute('x2', spokeEndX);
  line.setAttribute('y2', spokeEndY);
  line.setAttribute('stroke', `rgba(${c.r},${c.g},${c.b},0.12)`);
  line.setAttribute('stroke-width', '1.5');
  svg.appendChild(line);

  // Decorative dots along spoke
  [0.3, 0.5, 0.7].forEach(t => {
    const dx = startX + (spokeEndX - startX) * t;
    const dy = startY + (spokeEndY - startY) * t;
    const dot = document.createElementNS(ns, 'circle');
    dot.setAttribute('cx', dx);
    dot.setAttribute('cy', dy);
    dot.setAttribute('r', '2');
    dot.setAttribute('fill', `rgba(${c.r},${c.g},${c.b},0.15)`);
    svg.appendChild(dot);
  });

  spokeEls.push({ startX, startY, endX: spokeEndX, endY: spokeEndY, color: c });
});

// Hub ring
const ring = document.createElementNS(ns, 'circle');
ring.setAttribute('cx', CX);
ring.setAttribute('cy', CY);
ring.setAttribute('r', INNER_R);
ring.setAttribute('fill', 'none');
ring.setAttribute('stroke', 'rgba(0,212,170,0.08)');
ring.setAttribute('stroke-width', '1');
svg.appendChild(ring);

// Outer orbit ring hint
const outerRing = document.createElementNS(ns, 'circle');
outerRing.setAttribute('cx', CX);
outerRing.setAttribute('cy', CY);
outerRing.setAttribute('r', OUTER_R - 20);
outerRing.setAttribute('fill', 'none');
outerRing.setAttribute('stroke', 'rgba(255,255,255,0.02)');
outerRing.setAttribute('stroke-width', '1');
outerRing.setAttribute('stroke-dasharray', '4 8');
svg.appendChild(outerRing);

// ---- Canvas animation ----
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

class SpokeParticle {
  constructor(spoke, offset) {
    this.spoke = spoke;
    this.progress = offset;
    this.speed = 0.004 + Math.random() * 0.003;
    this.radius = 2 + Math.random() * 1.5;
    this.glowR = 8 + Math.random() * 5;
    this.alpha = 0.7 + Math.random() * 0.3;
    this.pulse = Math.random() * Math.PI * 2;
    this.dir = Math.random() > 0.3 ? 1 : -1;
  }
  update() {
    this.progress += this.speed * this.dir;
    if (this.progress > 1) this.progress -= 1;
    if (this.progress < 0) this.progress += 1;
    this.pulse += 0.03;
  }
  draw(ctx) {
    const s = this.spoke;
    const x = s.startX + (s.endX - s.startX) * this.progress;
    const y = s.startY + (s.endY - s.startY) * this.progress;
    const p = 0.6 + 0.4 * Math.sin(this.pulse);
    const c = s.color;

    const grad = ctx.createRadialGradient(x, y, 0, x, y, this.glowR * p);
    grad.addColorStop(0, `rgba(${c.r},${c.g},${c.b},${0.4 * this.alpha * p})`);
    grad.addColorStop(0.5, `rgba(${c.r},${c.g},${c.b},${0.1 * this.alpha})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, this.glowR * p, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${this.alpha})`;
    ctx.beginPath();
    ctx.arc(x, y, this.radius * p, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `rgba(255,255,255,${0.55 * p})`;
    ctx.beginPath();
    ctx.arc(x, y, this.radius * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
}

class OrbitParticle {
  constructor(radius, speed, color) {
    this.radius = radius;
    this.angle = Math.random() * Math.PI * 2;
    this.speed = speed;
    this.dotR = 1.5 + Math.random();
    this.glowR = 5 + Math.random() * 4;
    this.color = color;
    this.alpha = 0.35 + Math.random() * 0.25;
    this.pulse = Math.random() * Math.PI * 2;
  }
  update() { this.angle += this.speed; this.pulse += 0.02; }
  draw(ctx) {
    const x = CX + Math.cos(this.angle) * this.radius;
    const y = CY + Math.sin(this.angle) * this.radius;
    const p = 0.6 + 0.4 * Math.sin(this.pulse);
    const c = this.color;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, this.glowR * p);
    grad.addColorStop(0, `rgba(${c.r},${c.g},${c.b},${0.3 * this.alpha * p})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, this.glowR * p, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${this.alpha * p})`;
    ctx.beginPath();
    ctx.arc(x, y, this.dotR, 0, Math.PI * 2);
    ctx.fill();
  }
}

const particles = [];
spokeEls.forEach(spoke => {
  for (let i = 0; i < 3; i++) {
    particles.push(new SpokeParticle(spoke, Math.random()));
  }
});

const orbitColors = [COLORS[1], COLORS[2], COLORS[3], COLORS[4], COLORS[5]];
const orbiters = [];
for (let i = 0; i < 10; i++) {
  orbiters.push(new OrbitParticle(
    INNER_R + 5 + Math.random() * 12,
    (0.003 + Math.random() * 0.004) * (Math.random() > 0.5 ? 1 : -1),
    orbitColors[i % 5]
  ));
}
for (let i = 0; i < 6; i++) {
  orbiters.push(new OrbitParticle(
    OUTER_R - 25 + Math.random() * 10,
    (0.001 + Math.random() * 0.002) * (Math.random() > 0.5 ? 1 : -1),
    orbitColors[i % 5]
  ));
}

class Ambient {
  constructor() {
    this.x = Math.random() * 1080;
    this.y = Math.random() * 1350;
    this.r = 0.3 + Math.random() * 0.5;
    this.maxA = 0.04 + Math.random() * 0.06;
    this.phase = Math.random() * Math.PI * 2;
    this.speed = 0.005 + Math.random() * 0.01;
  }
  update() { this.phase += this.speed; }
  draw(ctx) {
    const a = this.maxA * Math.max(0, Math.sin(this.phase));
    if (a < 0.01) return;
    ctx.fillStyle = `rgba(100,200,230,${a})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

const ambient = [];
for (let i = 0; i < 50; i++) ambient.push(new Ambient());

function animate() {
  ctx.clearRect(0, 0, 1080, 1350);
  ambient.forEach(a => { a.update(); a.draw(ctx); });
  orbiters.forEach(o => { o.update(); o.draw(ctx); });
  particles.forEach(p => { p.update(); p.draw(ctx); });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
