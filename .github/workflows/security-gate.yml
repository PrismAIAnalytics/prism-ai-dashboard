# Security Gate CI — T-060
#
# Implements Layer 1B controls 7.2 (SAST + SCA on release) and SBOM emission
# from the Prism CIS-style hardening baseline (CIS Benchmarks/dev-surface-hardening-baseline.html).
#
# Gates that fail the PR: npm audit (high+ in prod deps), Semgrep SAST, gitleaks.
# Release artifact (push to main only): CycloneDX SBOM uploaded with 90-day retention.

name: Security Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (critical in prod deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
      # --ignore-scripts: avoids lifecycle-script RCE class during install
      - name: Install
        run: npm ci --ignore-scripts
      # --omit=dev: production-only audit; dev tooling CVEs don't ship to Railway
      # --audit-level=critical (interim): gate fails on Critical CVEs only.
      #
      # Why not 'high' (the recommended bar)?
      # As of 2026-05-22 the prod tree carries 4 High-severity transitive CVEs,
      # all inside node-quickbooks's pinned dependency ranges (fast-xml-parser,
      # lodash, underscore, uuid). Upgrading to node-quickbooks@2.0.43 (the
      # patched line) is a breaking change against the live QBO integration
      # at server.js:5816+. Tracked as T-061 — once tested, raise this gate
      # back to 'high'.
      - name: Audit
        run: npm audit --omit=dev --audit-level=critical

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan
        # Two confirmed-stable Semgrep registry packs. p/express and
        # p/nodejs-best-practice both 404 on the registry as of 2026-05-22 —
        # if Semgrep adds an Express-specific pack later, add it back.
        #
        # --exclude-rule dockerfile.security.missing-user.missing-user:
        # The dashboard container intentionally runs as root because Railway's
        # mounted volume at /app/data needs write access for the SQLite WAL
        # file. See Dockerfile lines above CMD for the architectural
        # justification. Promotion to non-root requires a Railway volume
        # permissions test (out of scope for T-060). Inline nosemgrep
        # directive in the Dockerfile is also present but not recognized for
        # this end-of-file rule type — workflow-level exclude is the
        # documented suppression path.
        run: |
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/javascript \
            --exclude-rule dockerfile.security.missing-user.missing-user \
            --error \
            --metrics=off

  trufflehog:
    name: TruffleHog (secret scan)
    runs-on: ubuntu-latest
    # Replaced gitleaks-action@v2 (required paid Gitleaks Premium license for
    # GitHub Orgs as of 2026). TruffleHog is free for orgs and arguably more
    # capable — entropy detection + active-credential verification.
    #
    # T-074 (2026-05-25): dropped `base` and `head` inputs. The prior config
    # set `base: main, head: HEAD` which resolved to the same commit on every
    # push event, causing the action to exit 1 with "BASE and HEAD commits
    # are the same. TruffleHog won't scan anything." The action's built-in
    # event handler resolves base/head correctly for both `pull_request` and
    # `push` events when those inputs are absent. This was the root cause of
    # the Railway "Deploy commit" manual-override workaround on every merge.
    # See PRISM-485 (Notion 36b236b6-b03a-8155-9503-edb879fa94f3) for the
    # full incident timeline and evidence.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          path: ./
          extra_args: --only-verified

  sbom:
    name: CycloneDX SBOM (release artifact)
    runs-on: ubuntu-latest
    # Release-only: emit SBOM on push to main, not on every PR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci --ignore-scripts
      - name: Generate CycloneDX SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm@1.19.3 --output-file sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-cyclonedx-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 90
