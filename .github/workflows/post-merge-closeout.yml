# Post-merge close-out — T-094
#
# Releases the WIP=1 lock at merge time. The lock is the single "In Progress"
# row in TASKS.md (WORKFLOW.md §3). A task claims it inside its feature PR, but
# the close-out (move the row to Done This Week WITH the squash SHA) can't ship
# in that same PR — the squash SHA doesn't exist until after merge. §4's
# "bundle into the next task's first commit" workaround leaves a STALE row on
# main whenever there's no next task soon. Recurred 4× (T-059/T-088/T-090/T-093).
#
# What this does, when a feature PR squash-merges to main:
#   1. Reads the single In Progress T-ID from TASKS.md on main.
#   2. Cross-checks that row's Branch cell == the merged PR's head ref. On any
#      mismatch / empty / >1 row, it NO-OPS and warns — it never guesses.
#   3. Opens a `chore/auto-close-tNNN` PR moving the row to Done This Week with
#      the merge metadata, then immediately squash-merges it (T-130). The edit
#      is machine-generated by the guarded, unit-tested close-merged-task.js
#      transform and touches one TASKS.md row only — auto-merging it is the
#      point; the human speed bump stays on feature PRs, where it belongs.
#
# Why an auto-PR and not a direct push to main:
#   main is branch-protected (T-004: PR required, bypass list empty, applies to
#   admins). A direct push from CI is rejected (GH013) unless the Actions bot is
#   added to a bypass list — which would punch an automation hole in the exact
#   protection that closed wipe #3. So we open a PR instead.
#
# ⚠️  This workflow NEVER runs scripts/sync-tasks.js — T-091 flags it
#     DO-NOT-RUN-LIVE (notion-only mass-create risk). It edits the TASKS.md
#     markdown file only; the dashboard + Notion mirrors are reconciled
#     separately once T-091 ships.
#
# Token strategy (T-130). The PrismAIAnalytics org policy forbids the Actions
# GITHUB_TOKEN from creating PRs ("The organization does not allow GitHub
# Actions to create or approve pull requests"), and a repo-level setting can't
# override it. The PR step therefore prefers the CLOSEOUT_PAT repo secret — a
# fine-grained PAT scoped to this repo with Contents:RW + Pull requests:RW —
# which bypasses the org GITHUB_TOKEN restriction without loosening the
# org-wide policy. With the PAT the whole close-out is autonomous: PR opened,
# squash-merged, branch deleted (the "Protect main" ruleset requires a PR but
# zero approvals, so the immediate self-merge is allowed).
#
# Without the PAT the run FAILS RED (T-130 — reversing T-095's stay-green
# choice). Five of six close-outs drifted for days-to-weeks because the
# one-click link lived in a green run's summary that nobody opened; a red run
# sends a failure notification and shows a visible ✗. The close-out branch is
# still pushed first, and the error annotation carries the one-click link, so
# the manual recovery is unchanged — just no longer silent.

name: Post-merge close-out

on:
  pull_request:
    types: [closed]
    branches: [main]

# This job opens a PR and pushes a feature branch — needs write on both.
# (Pushing a NEW branch is fine; only main is protected.)
permissions:
  contents: write
  pull-requests: write

# Serialize so two near-simultaneous merges can't race on TASKS.md. cancel
# disabled so each merge gets its own close-out attempt.
concurrency:
  group: post-merge-closeout
  cancel-in-progress: false

jobs:
  closeout:
    # Only on a real merge, and never on our own auto-close PRs (loop guard:
    # the chore/auto-close-* PR's merge would otherwise re-trigger this).
    if: >-
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.head.ref, 'chore/auto-close-')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Compute close-out edit
        id: close
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          # No deps needed — pure node stdlib. Emits closed=true|false + tid to
          # $GITHUB_OUTPUT. The --expect-branch cross-check is what makes a
          # mismatched (e.g. no-ticket override) merge a safe no-op.
          node scripts/close-merged-task.js \
            --pr="${PR_NUMBER}" \
            --sha="${MERGE_SHA}" \
            --date="${DATE}" \
            --expect-branch="${HEAD_REF}"

      - name: Push close-out branch, open PR, squash-merge it
        id: pr
        if: steps.close.outputs.closed == 'true'
        env:
          # CLOSEOUT_PAT (fine-grained, this repo only, Contents:RW +
          # Pull requests:RW) makes the close-out autonomous. Falls back to the
          # Actions token, which the org policy blocks from creating PRs.
          GH_TOKEN: ${{ secrets.CLOSEOUT_PAT || github.token }}
          HAS_PAT: ${{ secrets.CLOSEOUT_PAT != '' }}
          TID: ${{ steps.close.outputs.tid }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          # Branch slug e.g. T-094 → t094 (no stray dash). Still matches the
          # `chore/auto-close-` loop-guard prefix in this job's `if:`.
          TID_SLUG=$(echo "$TID" | tr '[:upper:]' '[:lower:]' | tr -d '-')
          BRANCH="chore/auto-close-${TID_SLUG}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add TASKS.md
          git commit -m "chore: close ${TID} (post-merge auto close-out, PR #${PR_NUMBER} as ${MERGE_SHA})"
          git push -u origin "$BRANCH"

          BODY=$(printf '%s\n' \
            "Automated WIP=1 lock release for **${TID}**, whose feature PR #${PR_NUMBER} squash-merged as \`${MERGE_SHA}\`." \
            "" \
            "Moves the ${TID} row **In Progress → Done This Week** in TASKS.md, clearing the lock that would otherwise carry stale on \`main\` — the recurring close-out gap (T-059 / T-088 / T-090 / T-093)." \
            "" \
            "- Markdown-only change to TASKS.md." \
            "- \`scripts/sync-tasks.js\` was **NOT** run (T-091 DO-NOT-RUN-LIVE)." \
            "- Auto-squash-merged by the Action when CLOSEOUT_PAT is configured (T-130)." \
            "" \
            "🤖 Branch generated by the post-merge close-out Action.")

          COMPARE_URL="https://github.com/${GITHUB_REPOSITORY}/pull/new/${BRANCH}"
          echo "compare_url=${COMPARE_URL}" >> "$GITHUB_OUTPUT"

          set +e
          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "chore: close ${TID} (post-merge auto close-out)" \
            --body "$BODY" 2>pr_err.txt)
          RC=$?
          set -e
          if [ "$RC" -ne 0 ]; then
            cat pr_err.txt || true
            # T-130: fail RED, not green. Five of six close-outs drifted because
            # this link only lived in a green run's summary. The branch is
            # pushed; the red run + notification is the visibility mechanism.
            echo "::error::Close-out PR for ${TID} could not be opened (org policy blocks the Actions token; CLOSEOUT_PAT present: ${HAS_PAT}). Branch ${BRANCH} is pushed — open + squash-merge it: ${COMPARE_URL} . To make this autonomous, add a fine-grained PAT (this repo, Contents:RW + Pull requests:RW) as repo secret CLOSEOUT_PAT."
            exit 1
          fi
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "::notice::Opened close-out PR for ${TID}: ${PR_URL}"

          # Squash-merge immediately (T-130). The "Protect main" ruleset
          # requires a PR but zero approvals and no status checks, so the
          # self-merge completes at once. Retry briefly — a just-created PR can
          # sit in mergeable:UNKNOWN for a few seconds.
          MERGED=false
          for i in 1 2 3; do
            if gh pr merge "$PR_URL" --squash; then
              MERGED=true
              break
            fi
            sleep 5
          done
          if [ "$MERGED" != "true" ]; then
            echo "::error::Close-out PR for ${TID} was opened but could not be auto-merged — squash-merge it manually to release the lock: ${PR_URL}"
            exit 1
          fi
          # Branch cleanup is best-effort — a failure here must not turn a
          # successful lock release into a red run.
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${BRANCH}" || true
          echo "::notice::Close-out for ${TID} merged autonomously — WIP=1 lock released."

      - name: Summary
        if: always()
        env:
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          COMPARE_URL: ${{ steps.pr.outputs.compare_url }}
          TID: ${{ steps.close.outputs.tid }}
          CLOSED: ${{ steps.close.outputs.closed }}
          PR_OUTCOME: ${{ steps.pr.outcome }}
        run: |
          {
            echo "## Post-merge close-out"
            echo ""
            if [ "${CLOSED:-}" = "true" ]; then
              if [ "${PR_OUTCOME:-}" = "success" ]; then
                echo "Close-out PR for \`${TID}\` opened **and squash-merged** — WIP=1 lock released autonomously:"
                echo ""
                echo "${PR_URL}"
              elif [ -n "${PR_URL:-}" ]; then
                echo "Close-out PR for \`${TID}\` is open but was **not** auto-merged. **Squash-merge it to release the lock:**"
                echo ""
                echo "${PR_URL}"
              else
                echo "Close-out branch for \`${TID}\` is pushed; the PR could not be auto-opened (run failed red so this is noticed). **Open + squash-merge in one click:**"
                echo ""
                echo "${COMPARE_URL}"
                echo ""
                echo "To make close-outs autonomous: add a fine-grained PAT (this repo only, Contents:RW + Pull requests:RW) as repo secret \`CLOSEOUT_PAT\`."
              fi
            else
              echo "No close-out needed — In Progress was empty, ambiguous (>1 row), or the merged branch didn't match the locked row. Lock left unchanged."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
